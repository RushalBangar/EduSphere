<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="g2" x1="32" y1="0" x2="0" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Dark rounded-square background -->
  <rect width="32" height="32" rx="8" fill="#0f0c1e"/>
  <!-- Subtle glow -->
  <rect width="32" height="32" rx="8" fill="url(#glow)"/>
  <!-- Stylised "E" with sphere cutout — the EduSphere mark -->
  <!-- Left vertical bar of E -->
  <rect x="7" y="7" width="3.5" height="18" rx="1.5" fill="url(#g1)"/>
  <!-- Top arm of E -->
  <rect x="7" y="7" width="12" height="3.5" rx="1.5" fill="url(#g1)"/>
  <!-- Middle arm (shorter — premium detail) -->
  <rect x="7" y="14.25" width="9" height="3.5" rx="1.5" fill="url(#g2)"/>
  <!-- Bottom arm of E -->
  <rect x="7" y="21.5" width="12" height="3.5" rx="1.5" fill="url(#g1)"/>
  <!-- Sphere accent dot — top right -->
  <circle cx="23.5" cy="9.5" r="3.5" fill="url(#g2)" opacity="0.9"/>
</svg>
